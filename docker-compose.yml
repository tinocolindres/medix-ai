version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: medix_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: medix_db
      POSTGRES_USER: medix_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medix_user -d medix_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medix_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medix_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://medix_user:${POSTGRES_PASSWORD}@db:5432/medix_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO}
      STRIPE_PRICE_CLINICAL: ${STRIPE_PRICE_CLINICAL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET_MEDSCAN: ${S3_BUCKET_MEDSCAN:-medix-scans-prod}
      CHROMA_PERSIST_DIR: /app/chroma_db
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
      - sesal_pdfs:/app/data/sesal
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medix_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://medix_user:${POSTGRES_PASSWORD}@db:5432/medix_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medix_beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://medix_user:${POSTGRES_PASSWORD}@db:5432/medix_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      - redis
      - worker
    volumes:
      - ./backend:/app
    command: celery -A app.worker.celery_app beat --loglevel=info

volumes:
  postgres_data:
  chroma_data:
  sesal_pdfs:
