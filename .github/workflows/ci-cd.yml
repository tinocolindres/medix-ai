name: Medix AI — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  FLUTTER_VERSION: "3.24.0"

# ══════════════════════════════════════════════════════════════
# JOB 1: Tests Backend
# ══════════════════════════════════════════════════════════════
jobs:
  test-backend:
    name: 🧪 Tests Backend (FastAPI)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: medix_test
          POSTGRES_USER: medix_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 📦 Instalar dependencias
        working-directory: backend
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: 🔬 Ejecutar tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://medix_user:test_password@localhost:5432/medix_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test_secret_key_32_chars_minimum_x
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet — skipping"

      - name: ✅ Lint (Ruff)
        working-directory: backend
        run: |
          pip install ruff 2>/dev/null
          ruff check app/ --ignore E501 || true

  # ══════════════════════════════════════════════════════════════
  # JOB 2: Build Flutter (análisis estático)
  # ══════════════════════════════════════════════════════════════
  analyze-flutter:
    name: 🦋 Análisis Flutter
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 📦 Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: 🔬 Flutter analyze
        working-directory: mobile
        run: flutter analyze --no-fatal-infos || true

      - name: 🧪 Flutter tests
        working-directory: mobile
        run: flutter test 2>/dev/null || echo "No tests yet"

  # ══════════════════════════════════════════════════════════════
  # JOB 3: Deploy Railway (solo main branch)
  # ══════════════════════════════════════════════════════════════
  deploy-railway:
    name: 🚀 Deploy Railway
    needs: [test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚂 Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: 🚀 Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service medix-backend --detach

      - name: ✅ Verificar health check
        run: |
          sleep 30
          curl --fail https://${{ secrets.RAILWAY_DOMAIN }}/health || exit 1
          echo "🎉 Medix AI desplegado correctamente"

  # ══════════════════════════════════════════════════════════════
  # JOB 4: Build Flutter APK (release en tags v*)
  # ══════════════════════════════════════════════════════════════
  build-flutter-apk:
    name: 📱 Build Flutter APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 📦 Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: 🔑 Decode keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: mobile/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/medix-release.jks

      - name: 📦 Build APK Release
        working-directory: mobile
        env:
          DART_DEFINES: API_BASE_URL=https://${{ secrets.RAILWAY_DOMAIN }}/api/v1
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://${{ secrets.RAILWAY_DOMAIN }}/api/v1

      - name: 📤 Upload APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: medix-ai-${{ github.ref_name }}.apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 🏷️ Crear Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
